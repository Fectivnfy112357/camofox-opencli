services:
  camofox:
    build:
      context: .
      dockerfile: Dockerfile
      # Named build context. The Camoufox binary bundle is injected from the
      # host cache at deploy time (see deploy.sh) so the Dockerfile can
      # `COPY --from=camoufox ...` without running `camoufox-js fetch` over
      # the network (which is unreliable in build-time containers).
      additional_contexts:
        camoufox: ${CAMOFOX_CACHE_DIR:-/dev/null}
        # Runtime-only assets camoufox-js would otherwise download at first
        # browser launch: ublock-origin xpi (extracted) + GeoLite2-City.mmdb.
        # Provided from /opt/camoufox-runtime/ by deploy.sh. When the dir is
        # absent, the build still succeeds — the camoufox named context above
        # is the only hard requirement.
        runtime-addons: ${RUNTIME_ADDONS_DIR:-/dev/null}
    container_name: camofox
    restart: unless-stopped

    ports:
      - "9377:9377"
      - "6080:6080"
      - "19825:19825"
      # Host port for the gateway (REST + MCP). Override GATEWAY_EXPOSE_PORT
      # in .env when the default 8080 is taken on the host (maps to the
      # container's fixed 8080).
      - "${GATEWAY_EXPOSE_PORT:-8080}:8080"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # Camofox
      CAMOFOX_HOST: "0.0.0.0"
      CAMOFOX_PORT: "9377"
      CAMOFOX_AUTH_MODE: "auto"
      CAMOFOX_API_KEY: "my_secret_api_key_123"
      CAMOFOX_VNC_TIMEOUT_MS: "600000"
      ENABLE_VNC: "1"
      VNC_PASSWORD: "my_vnc_password"
      PROXY_HOST: "host.docker.internal"
      PROXY_PORT: "20172"
      CAMOFOX_ALLOW_PRIVATE_NETWORK: "true"
      # camoufox-js's Node fetcher (webdl / GitHub release lookups / GeoIP DB
      # download) honours standard Node HTTP_PROXY env vars. The PROXY_HOST/
      # PORT above are only used by the browser fingerprint proxy layer and
      # don't apply to Node-side fetch. Pointing both at v2raya makes the
      # initial addon bootstrap and GeoIP refresh reachable from this
      # container.
      HTTP_PROXY: "http://host.docker.internal:20172"
      HTTPS_PROXY: "http://host.docker.internal:20172"
      http_proxy: "http://host.docker.internal:20172"
      https_proxy: "http://host.docker.internal:20172"
      NO_PROXY: "localhost,127.0.0.1,host.docker.internal"
      # Shim
      CAMOFOX_URL: "http://localhost:9377"
      CAMOFOX_USER_ID: "fectivnfy"
      SHIM_PORT: "19825"
      # Gateway
      GATEWAY_PORT: "8080"
      GATEWAY_API_KEY: "change_me_gateway_key"
      OPENCLI_MANIFEST: "/opt/opencli/cli-manifest.json"
      GATEWAY_LOG_DIR: "/var/log/gateway"
      GATEWAY_LOG_LEVEL: "info"

    shm_size: "2gb"
    security_opt:
      - seccomp=unconfined
    volumes:
      - camofox_data:/home/node/.camofox
      # Gateway logs surfaced to the host for out-of-container inspection.
      # Override with GATEWAY_LOG_HOST_DIR in .env (default ./logs/gateway).
      - "${GATEWAY_LOG_HOST_DIR:-./logs/gateway}:/var/log/gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9377/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  camofox_data: