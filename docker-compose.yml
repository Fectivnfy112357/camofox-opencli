services:
  camofox:
    # Default: pull the pre-built image from GitHub Container Registry.
    # To build locally instead, comment out `image:` and uncomment the
    # `build:` block below.
    image: ghcr.io/fectivnfy112357/camofox-opencli:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   # Two sibling source trees live next to this compose file on the host:
    #   #   ../camofox-browser   (the camofox-browser fork)
    #   #   ../opencli           (the OpenCLI fork)
    #   # We inject them as named build contexts so the Dockerfile can `COPY
    #   # --from=camofox-browser` etc. without any git-submodule wiring.
    #   additional_contexts:
    #     # Sibling source trees live next to this compose file on the host.
    #     # Override via CAMOFOX_BROWSER_DIR / OPENCLI_DIR env vars when the
    #     # siblings happen to live elsewhere.
    #     camofox-browser: ${CAMOFOX_BROWSER_DIR:-./camofox-browser}
    #     opencli:         ${OPENCLI_DIR:-./opencli}
    #   # The Dockerfile sets http_proxy=http://host.docker.internal:20172 so
    #   # build-stage apt/curl/npm go through the host's v2raya. Build
    #   # containers need their own extra_hosts mapping (the one in the
    #   # service block below only applies to the runtime container).
    #   extra_hosts:
    #     - "host.docker.internal:host-gateway"
    container_name: camofox
    restart: unless-stopped

    # extra_hosts is also needed at runtime: the Camofox browser connects
    # back to the host's v2raya at host.docker.internal:20172 for HTTPS
    # traffic, and the gateway's yt-dlp invocation uses the same proxy.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "9377:9377"
      - "6080:6080"
      - "19825:19825"
      - "9378:8080"

    environment:
      # Camofox
      CAMOFOX_HOST: "0.0.0.0"
      CAMOFOX_PORT: "9377"
      CAMOFOX_AUTH_MODE: "auto"
      CAMOFOX_API_KEY: "my_secret_api_key_123"
      CAMOFOX_VNC_TIMEOUT_MS: "600000"
      ENABLE_VNC: "1"
      VNC_PASSWORD: "my_vnc_password"
      # vnc-watcher.sh defaults to 127.0.0.1 which makes the noVNC port
      # reachable only from inside the container. Bind to 0.0.0.0 so
      # `docker port ... 6080` maps the host port through to the actual
      # websockify listener.
      VNC_BIND: "0.0.0.0"
      PROXY_HOST: "host.docker.internal"
      PROXY_PORT: "20172"
      CAMOFOX_ALLOW_PRIVATE_NETWORK: "true"
      # Intentionally NO HTTP_PROXY/HTTPS_PROXY here: PROXY_HOST/PORT above
      # already covers the browser's fingerprint-proxy layer, and the runtime
      # image carries a pre-populated /home/node/.cache/camoufox (UBO +
      # version.json + GeoLite2-City.mmdb) so camoufox-js has nothing to fetch
      # at startup. If a future camoufox-js release starts pulling a new
      # resource on launch, reintroduce HTTP_PROXY=http://host.docker.internal:20172
      # — at that point revert with caution and re-add the resources to the
      # runtime-addons context in deploy.sh.
      # Shim
      CAMOFOX_URL: "http://localhost:9377"
      CAMOFOX_USER_ID: "fectivnfy"
      SHIM_PORT: "19825"
      # Pin camoufox-js to the pre-baked cache directory (set up by the
      # Dockerfile's cb-build stage from ./camoufox-bin/). Without this it
      # defaults to ~/.cache/camoufox — same path we baked into, but
      # makes the contract explicit.
      CAMOUFOX_INSTALL_DIR: "/home/node/.cache/camoufox"
      # Give YouTube-style SPA sites room to fully render before we time out
      # the navigation. Default in camofox-browser/lib/config.js is 25s; some
      # results pages take 30-45s over the v2raya tunnel.
      NAVIGATE_TIMEOUT_MS: "90000"
      # Gateway
      GATEWAY_PORT: "8080"
      GATEWAY_API_KEY: "change_me_gateway_key"
      OPENCLI_MANIFEST: "/opt/opencli/cli-manifest.json"
      GATEWAY_LOG_DIR: "/var/log/gateway"
      GATEWAY_LOG_LEVEL: "info"
      # Point the gateway's video_download temp dir at the bind-mounted
      # /opt/gateway/tmp. Without this, files land in the container's
      # ephemeral /tmp and never reach the host's ./data/download.
      GATEWAY_TMP_DIR: "/opt/gateway/tmp"

    shm_size: "2gb"
    security_opt:
      - seccomp=unconfined
    volumes:
      # Browser profiles / cookies / downloads / VNC tokens live under
      # /home/node/.camofox inside the container. Bind the host's
      # ./data directory to the same path so a `docker compose build
      # && up -d` preserves login state across rebuilds.
      - ./data:/home/node/.camofox
      # Gateway JSONL logs + supervisor stderr/stdout for out-of-container
      # inspection. Override with GATEWAY_LOG_HOST_DIR in .env.
      - "${GATEWAY_LOG_HOST_DIR:-./data/log}:/var/log/gateway"
      # video_download temp files (TTL 1h, swept every 10min). Bind-mount
      # to ./data/download so host-side cleanup is also possible.
      - "${GATEWAY_TMP_HOST_DIR:-./data/download}:/opt/gateway/tmp"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9377/health"]
      interval: 30s
      timeout: 5s
      retries: 3
