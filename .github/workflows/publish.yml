name: Publish Docker image

# Build and push the camofox-opencli image to GitHub Container Registry
# whenever a change lands on `main` (or manually via workflow_dispatch). The
# resulting image is self-contained: camoufox-bin, uBlock Origin and
# GeoLite2-City.mmdb are baked in during the build, so end users only need
# to `docker pull` and `docker run`.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.publish'
      - 'opencli/**'
      - 'camofox-shim/**'
      - 'camofox-browser/**'
      - 'supervisord.conf'
      - 'entrypoint.sh'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG_SHA: ${{ github.sha }}

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Submodules are required — they carry opencli, camofox-shim and
          # camofox-browser fork sources that the Dockerfile copies in.
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.publish
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CAMOUFOX_VERSION=152.0.4
            CAMOUFOX_RELEASE=beta.27
            GEOLITE_TAG=2026.07.16
